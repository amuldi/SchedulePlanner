<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchedulePlanner</title>
  <meta name="theme-color" content="#f0eee8">
  <meta name="apple-mobile-web-app-title" content="SchedulePlanner">
  <link rel="icon" href="./assets/icons/favicon-blue.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon-blue.png?v=2">
  <link rel="manifest" href="./site.webmanifest">
  <link rel="stylesheet" href="./src/styles.css?v=16">
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <button class="identity" id="openProfile" type="button" aria-label="프로필 편집">
        <span class="avatar" id="avatar"><span class="profile-glyph" aria-hidden="true"></span></span>
        <span class="identity-copy">
          <span class="kicker">SchedulePlanner</span>
          <span class="profile-title" id="profileName">SchedulePlanner</span>
        </span>
      </button>
      <div class="tools">
        <div class="search" role="search">
          <label class="sr-only" for="searchInput">검색</label>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.75 18.25a7.5 7.5 0 1 1 5.3-2.2l3.45 3.45-1.42 1.42-3.45-3.45a7.47 7.47 0 0 1-3.88 1.08Zm0-2a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11Z"/></svg>
          <input id="searchInput" type="search" placeholder="검색" autocomplete="off">
          <button class="search-clear" id="clearSearch" type="button" aria-label="검색어 지우기" hidden><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm11.2 0L19 6.4 6.4 19 5 17.6 17.6 5Z"/></svg></button>
        </div>
        <button class="notify-btn" id="notificationBtn" type="button" aria-label="알림 권한 확인">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.6 2.6 0 0 0 2.45-1.75h-4.9A2.6 2.6 0 0 0 12 22Zm7-5h-1V10a6 6 0 0 0-4.5-5.8V3a1.5 1.5 0 0 0-3 0v1.2A6 6 0 0 0 6 10v7H5v2h14v-2Zm-3 0H8v-7a4 4 0 0 1 8 0v7Z"/></svg>
          <span id="notificationStatus">알림 허용</span>
        </button>
        <button class="icon-btn" id="exportBtn" type="button" title="내보내기" aria-label="내보내기"><svg viewBox="0 0 24 24"><path d="M11 4h2v8.17l2.59-2.58L17 11l-5 5-5-5 1.41-1.41L11 12.17V4Zm-5 14h12v2H6v-2Z"/></svg></button>
        <button class="icon-btn" id="importBtn" type="button" title="가져오기" aria-label="가져오기"><svg viewBox="0 0 24 24"><path d="M11 20h2v-8.17l2.59 2.58L17 13l-5-5-5 5 1.41 1.41L11 11.83V20ZM6 4h12v2H6V4Z"/></svg></button>
        <input id="importFile" class="sr-only" type="file" accept="application/json">
      </div>
    </header>
    <main class="workspace">
      <section class="panel calendar-panel" aria-labelledby="calendarTitle">
        <div class="panel-head">
          <div><p class="kicker">Calendar</p><h1 id="calendarTitle">월간 캘린더</h1></div>
          <div class="calendar-head-actions">
            <div class="segmented calendar-filter" aria-label="프로젝트 표시">
              <button class="segment active" type="button" data-cal-filter="all">전체</button>
              <button class="segment" type="button" data-cal-filter="active">진행</button>
              <button class="segment" type="button" data-cal-filter="done">완료</button>
            </div>
            <div class="month-actions">
              <button class="icon-btn" id="prevMonth" type="button" aria-label="이전 달"><svg viewBox="0 0 24 24"><path d="m15.5 5-7 7 7 7 1.4-1.4L11.3 12l5.6-5.6L15.5 5Z"/></svg></button>
              <button class="text-btn" id="todayBtn" type="button">오늘</button>
              <button class="icon-btn" id="nextMonth" type="button" aria-label="다음 달"><svg viewBox="0 0 24 24"><path d="m8.5 19 7-7-7-7-1.4 1.4 5.6 5.6-5.6 5.6L8.5 19Z"/></svg></button>
            </div>
          </div>
        </div>
        <div class="weekdays" aria-hidden="true"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="calendar" id="calendar"></div>
        <div class="holiday-strip" id="holidayStrip">공휴일 없음</div>
      </section>

      <aside class="panel planner-panel" aria-labelledby="plannerTitle">
        <div class="panel-head planner-head">
          <div><p class="kicker">Planner</p><h2 id="plannerTitle">일정 & 프로젝트</h2></div>
          <span class="date-pill" id="selectedLabel">오늘</span>
        </div>
        <div class="planner-tabs segmented" aria-label="관리 항목">
          <button class="segment active" type="button" data-planner-view="agenda" aria-selected="true">일정</button>
          <button class="segment" type="button" data-planner-view="projects" aria-selected="false">프로젝트</button>
        </div>
        <section class="planner-view active" data-view-panel="agenda" aria-labelledby="agendaTitle">
          <div class="view-head">
            <div><p class="kicker">Agenda</p><h2 id="agendaTitle">선택한 날짜</h2></div>
            <span class="today-badge" id="agendaTodayBadge" hidden>Today</span>
          </div>
          <form class="agenda-form" id="eventForm">
            <input type="hidden" id="eventId">
            <div class="date-range">
              <label><span>날짜</span><input id="eventDate" type="date" required></label>
              <label><span>종료</span><input id="eventEndDate" type="date" required></label>
            </div>
            <div class="two">
              <label><span>시작 시간</span><input id="eventTime" type="time" value="09:00" required></label>
              <label><span>종료 시간</span><input id="eventEndTime" type="time" value="10:00" required></label>
              <label class="reminder-field"><span>알림</span><select id="eventReminder"><option value="none">없음</option><option value="10">10분 전</option><option value="30">30분 전</option><option value="60">1시간 전</option></select></label>
            </div>
            <label><span>일정</span><input id="eventTitle" type="text" placeholder="예: 클라이언트 미팅" maxlength="60" required></label>
            <button class="primary" id="eventSubmit" type="submit">+ 일정 추가</button>
          </form>
          <div class="list" id="agendaList"></div>
        </section>
        <section class="planner-view" data-view-panel="projects" aria-labelledby="projectTitle">
          <div class="view-head">
            <div><p class="kicker">Projects</p><h2 id="projectTitle">프로젝트</h2></div>
            <div class="segmented project-filter" aria-label="프로젝트 필터">
              <button class="segment active" type="button" data-project-filter="all">전체</button>
              <button class="segment" type="button" data-project-filter="active">진행</button>
              <button class="segment" type="button" data-project-filter="upcoming">예정</button>
              <button class="segment" type="button" data-project-filter="done">완료</button>
            </div>
          </div>
          <form class="project-form" id="projectForm">
            <input type="hidden" id="projectId">
            <label class="project-name"><span>프로젝트명</span><input id="projectName" type="text" placeholder="예: 브랜드 리뉴얼" maxlength="60" required></label>
            <label><span>시작</span><input id="projectStart" type="date" required></label>
            <label><span>종료</span><input id="projectEnd" type="date" required></label>
            <label><span>분류</span><select id="projectCategory"><option value="work">Work</option><option value="client">Client</option><option value="study">Study</option><option value="personal">Personal</option><option value="todo">To do</option></select></label>
            <div class="field color-field"><span>색상</span><input id="projectColor" type="hidden" value="lime"><div class="color-picker" id="colorPicker"><button class="color-button" id="colorButton" type="button" aria-haspopup="listbox" aria-expanded="false"><span class="color-current"><span class="color-swatch" id="colorButtonSwatch"></span><span id="colorLabel">Mint</span></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9.5 5 5 5-5 1.4 1.4-6.4 6.4-6.4-6.4L7 9.5Z"/></svg></button><div class="color-menu" id="colorMenu" role="listbox" aria-label="프로젝트 색상"><button class="color-option" type="button" role="option" data-color-option="lime"><span class="color-swatch swatch-cloud"></span>Mint</button><button class="color-option" type="button" role="option" data-color-option="blue"><span class="color-swatch swatch-mist"></span>Sky</button><button class="color-option" type="button" role="option" data-color-option="red"><span class="color-swatch swatch-clay"></span>Coral</button><button class="color-option" type="button" role="option" data-color-option="teal"><span class="color-swatch swatch-sage"></span>Teal</button><button class="color-option" type="button" role="option" data-color-option="violet"><span class="color-swatch swatch-stone"></span>Violet</button><button class="color-option" type="button" role="option" data-color-option="amber"><span class="color-swatch swatch-sand"></span>Gold</button></div></div></div>
            <button class="primary" id="projectSubmit" type="submit">추가</button>
          </form>
          <div class="list" id="projectList"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="modal-bg" id="profileModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="profileModalTitle">
      <div class="panel-head compact" style="padding:0 0 14px;border-bottom:0">
        <div><p class="kicker">Profile</p><h2 id="profileModalTitle">프로필 편집</h2></div>
        <button class="icon-btn" id="closeProfile" type="button" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm11.2 0L19 6.4 6.4 19 5 17.6 17.6 5Z"/></svg></button>
      </div>
      <form class="profile-form" id="profileForm">
        <label><span>이름</span><input id="profileNameInput" type="text" maxlength="30" placeholder="SchedulePlanner"></label>
        <label><span>프로필 사진</span>
          <span class="file-control">
            <input id="profileAvatarInput" class="sr-only" type="file" accept="image/*">
            <span class="file-trigger">파일 선택</span>
            <span class="file-name" id="profileAvatarName">선택된 파일 없음</span>
          </span>
        </label>
        <div class="modal-actions"><button class="text-btn" id="clearAvatar" type="button">사진 삭제</button><button class="primary" type="submit">저장</button></div>
      </form>
    </section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./src/app.js?v=15" defer></script>
</body>
</html>
